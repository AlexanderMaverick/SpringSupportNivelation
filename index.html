<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Nivelación</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- update -->
  <h2>Calculadora de Nivelación</h2>

  <label><span class="scientific-var">h<sub>a</sub></span>:</label>
  <input id="consolaA" class="input-mm" type="text" inputmode="decimal" autocomplete="off" value="0 mm">

  <label><span class="scientific-var">h<sub>b</sub></span>:</label>
  <input id="consolaB" class="input-mm" type="text" inputmode="decimal" autocomplete="off" value="0 mm">

  <label>L1:</label>
  <input id="l1" class="input-mm" type="text" inputmode="decimal" autocomplete="off" value="0 mm">

  <label>L2:</label>
  <input id="l2" class="input-mm" type="text" inputmode="decimal" autocomplete="off" value="0 mm">

  <button type="button" onclick="calcular()">Calcular</button>

  <h3 id="resultado"></h3>
  <div id="grafica" class="grafica-wrap">
    <svg id="nivelSvg" viewBox="0 0 620 300" role="img" aria-label="Diagrama de nivelacion" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="deckGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a9a9a9"></stop>
          <stop offset="100%" stop-color="#7f7f7f"></stop>
        </linearGradient>
      </defs>

      <rect id="deckRect" x="247" y="80" width="329" height="200" fill="url(#deckGrad)" stroke="#4c4c4c"></rect>
      <g id="nivelObject" aria-label="Nivel de referencia">
        <title>Nivel Topográfico</title>
        <rect x="35" y="108" width="90" height="45" rx="2" ry="2" fill="#7f2185" stroke="#4f0e56" stroke-width="1.5"></rect>
        <text x="80" y="130.5" text-anchor="middle" dominant-baseline="middle" fill="#ffffff" font-size="13" font-weight="700">NIVEL</text>
      </g>
      <text id="yDegText" x="128" y="124" font-size="16" fill="#ffffff">β: 0°</text>

      <line id="lineY0" x1="125" y1="130.5" x2="600" y2="130.5" stroke="#0a9038" stroke-width="2" stroke-dasharray="8,8"></line>
      <line id="lineReal" x1="125" y1="130.5" x2="600" y2="130.5" stroke="#b42cb4" stroke-width="2" stroke-dasharray="10,7"></line>

      <!-- Cotas azules primero: quedan debajo de flechas y textos de medición -->
      <g id="dimL1Group">
        <line id="l1TickLeft" x1="125" y1="32" x2="125" y2="130.5" stroke="#156a9a" stroke-width="2"></line>
        <line id="l1TickRight" x1="316" y1="32" x2="316" y2="210" stroke="#156a9a" stroke-width="2"></line>
        <line id="l1Top" x1="125" y1="32" x2="316" y2="32" stroke="#156a9a" stroke-width="2"></line>
        <polygon id="l1ArrowLeft" points="125,32 133,28 133,36" fill="#156a9a"></polygon>
        <polygon id="l1ArrowRight" points="316,32 308,28 308,36" fill="#156a9a"></polygon>
      </g>
      <g id="dimL2Group">
        <line id="distLeft" x1="316" y1="32" x2="316" y2="210" stroke="#156a9a" stroke-width="2"></line>
        <line id="distRight" x1="507" y1="32" x2="507" y2="210" stroke="#156a9a" stroke-width="2"></line>
        <line id="distTop" x1="316" y1="32" x2="507" y2="32" stroke="#156a9a" stroke-width="2"></line>
        <polygon id="distArrowLeft" points="316,32 324,28 324,36" fill="#156a9a"></polygon>
        <polygon id="distArrowRight" points="507,32 499,28 499,36" fill="#156a9a"></polygon>
      </g>

      <!-- Consola a: una medición -->
      <line id="sraArrow" x1="316" y1="130.5" x2="316" y2="210" stroke="#ef6b11" stroke-width="2"></line>
      <polygon id="sraTip" points="316,130.5 310,138.5 322,138.5" fill="#ef6b11"></polygon>
      <text id="sraVarText" class="svgMeasure" x="324" y="126" font-size="18" fill="#e9edf5">x</text>
      <text id="sraText" class="svgMeasure" x="326" y="170.25" font-size="13" fill="#e9edf5">0 mm</text>
      <g id="sraObject" aria-label="Consola a">
        <title>Consola (ha)</title>
        <rect id="sraRect" x="271" y="210" width="90" height="34" rx="2" ry="2" fill="#ef6b11" stroke="#8f3b05" stroke-width="1.5"></rect>
        <text id="sraLabel" x="316" y="227" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#ffffff" font-weight="700">a</text>
      </g>

      <!-- Consola b: una medición -->
      <line id="srdArrow" x1="507" y1="130.5" x2="507" y2="210" stroke="#ef6b11" stroke-width="2"></line>
      <polygon id="srdTip" points="507,130.5 501,138.5 513,138.5" fill="#ef6b11"></polygon>
      <text id="srdVarText" class="svgMeasure" x="515" y="126" font-size="18" fill="#e9edf5">y</text>
      <text id="srdText" class="svgMeasure" x="517" y="170.25" font-size="13" fill="#e9edf5">0 mm</text>
      <g id="srdObject" aria-label="Consola b">
        <title>Consola (hb)</title>
        <rect id="srdRect" x="462" y="210" width="90" height="34" rx="2" ry="2" fill="#ef6b11" stroke="#8f3b05" stroke-width="1.5"></rect>
        <text id="srdLabel" x="507" y="227" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#ffffff" font-weight="700">b</text>
      </g>

      <!-- Textos L1/L2 al final del SVG (encima de cotas y naranjas) -->
      <g id="dimTextGroup">
        <text id="l1Text" x="220" y="15" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#e9edf5">L1 0 mm</text>
        <text id="distText" x="411.5" y="15" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#e9edf5">L2 0 mm</text>
      </g>
    </svg>
    <div class="grafica-leyenda" role="note" aria-label="Leyenda de líneas del diagrama">
      <div class="leyenda-item">
        <span class="leyenda-linea leyenda-proyeccion" aria-hidden="true"></span>
        <span>Proyección del Nivel</span>
      </div>
      <div class="leyenda-item">
        <span class="leyenda-linea leyenda-paralela" aria-hidden="true"></span>
        <span>Paralela Objetivo</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
